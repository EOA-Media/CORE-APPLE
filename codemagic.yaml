workflows:
  ios-release:
    name: CORE iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - Firebase
      node: 20
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.corefitness.app

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Check Firebase environment variables
        script: |
          echo "=== FIREBASE ENV CHECK ==="
          echo "VITE_FIREBASE_API_KEY length: ${#VITE_FIREBASE_API_KEY}"
          echo "FIREBASE_API_KEY length: ${#FIREBASE_API_KEY}"
          echo "VITE_FIREBASE_PROJECT_ID: $VITE_FIREBASE_PROJECT_ID"
          echo "FIREBASE_PROJECT_ID: $FIREBASE_PROJECT_ID"
          echo "VITE_FIREBASE_APP_ID length: ${#VITE_FIREBASE_APP_ID}"
          echo "FIREBASE_APP_ID length: ${#FIREBASE_APP_ID}"
          echo "=== END FIREBASE ENV CHECK ==="

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --archive-method app-store \
            --code-signing-setup-verbose-logging

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App || {
              echo "=== Xcode archive failed. Recent xcodebuild logs: ==="
              find /tmp/xcodebuild_logs -maxdepth 1 -type f -name "*.log" -print -exec tail -n 200 {} \;
              exit 1
            }

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
